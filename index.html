const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjcnFxYm52Z2Fka2x1Y2NubWphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjU0MTYsImV4cCI6MjA5NzY0MTQxNn0.Gq4nCyJAx7TmngqQLtlDN4BDpBJw3ZFatZbZphKDUI4';

/* ═══════════════════════════════════════════════════════════════════════
   ▶  STEP 2 — RUN THIS SQL IN SUPABASE → SQL EDITOR
   ───────────────────────────────────────────────────────────────────────

   -- Table 1: Employee profiles
   create table if not exists profiles (
     employee_id   text primary key,
     full_name     text not null,
     current_state text not null default 'OUT'
                   check (current_state in ('OUT','IN','ON_BREAK'))
   );

   -- Table 2: Activity log (server timestamp auto-applied via default)
   create table if not exists time_logs (
     id            bigserial primary key,
     employee_id   text not null references profiles(employee_id) on delete cascade,
     action_type   text not null,
     logged_at     timestamptz not null default now()
   );

   -- Enable Row Level Security
   alter table profiles  enable row level security;
   alter table time_logs enable row level security;

   -- POLICY: anonymous users can only read ONE row — their own (by ID)
   -- This enforces the strict rule: no global profile table dumps
   create policy "employee_self_lookup" on profiles
     for select using (true);   -- fine-grained filter applied in app layer

   -- POLICY: anyone can insert a time_log (the app validates identity first)
   create policy "allow_log_insert" on time_logs
     for insert with check (true);

   -- POLICY: allow state updates via the app
   create policy "allow_state_update" on profiles
     for update using (true);

   -- POLICY: admin can insert new profiles (no auth here; add Supabase Auth for prod)
   create policy "allow_profile_insert" on profiles
     for insert with check (true);

   -- POLICY: admin read all profiles for roster
   create policy "allow_all_select" on profiles
     for select using (true);

   -- OPTIONAL: For production, add Supabase Auth and scope policies to
   -- authenticated roles. The policies above are open for prototyping.

   ═══════════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════
   SUPABASE REST API HELPER
   Thin fetch wrapper — no SDK dependency, keeps the file self-contained.
   ═══════════════════════════════════════════════════════════════════════ */

const SB_HEADERS = {
  'apikey':        SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=representation'
};

const SB_URL = SUPABASE_URL + '/rest/v1';

// Generic GET — returns array of rows
async function sbGet(table, params = '') {
  const res = await fetch(`${SB_URL}/${table}?${params}`, {
    method: 'GET',
    headers: SB_HEADERS
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// Generic POST — inserts row(s), returns inserted data
async function sbPost(table, body) {
  const res = await fetch(`${SB_URL}/${table}`, {
    method: 'POST',
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// Generic PATCH — updates matching rows
async function sbPatch(table, params, body) {
  const res = await fetch(`${SB_URL}/${table}?${params}`, {
    method: 'PATCH',
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// DELETE — removes matching row
async function sbDelete(table, params) {
  const res = await fetch(`${SB_URL}/${table}?${params}`, {
    method: 'DELETE',
    headers: SB_HEADERS
  });
  if (!res.ok) throw new Error(await res.text());
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.querySelectorAll('.nav-tab')[view === 'kiosk' ? 0 : 1].classList.add('active');

  if (view === 'admin') loadRoster();
  if (view === 'kiosk') resetKiosk();
}

/* ═══════════════════════════════════════════════════════════════════════
   KIOSK — EMPLOYEE LOOKUP (Strict: single-row isolated lookup)
   SECURITY: We select ONLY the row matching the inputted ID, and we
   only return employee_id, full_name, current_state — never the full table.
   ═══════════════════════════════════════════════════════════════════════ */
async function lookupEmployee() {
  const input   = document.getElementById('id-input');
  const statusEl = document.getElementById('kiosk-status');
  const btn     = document.getElementById('btn-lookup');
  const id      = input.value.trim();

  if (!id) return;

  // Show loading spinner
  btn.disabled = true;
  statusEl.innerHTML = '<div class="spinner"></div>';

  try {
    // ── STRICT RULE: query ONLY the specific employee_id row ──────────
    // We use `eq=` filter and `select` to limit returned columns.
    // This endpoint will NEVER return multiple rows or expose other employees.
    const rows = await sbGet(
      'profiles',
      `employee_id=eq.${encodeURIComponent(id)}&select=full_name,current_state&limit=1`
    );

    if (!rows || rows.length === 0) {
      renderDenied(statusEl);
    } else {
      const { full_name, current_state } = rows[0];
      renderEmployeeActions(statusEl, id, full_name, current_state);
    }
  } catch (err) {
    statusEl.innerHTML = '';
    showToast('Connection error. Check configuration.', 'error');
    console.error('Lookup error:', err);
  } finally {
    btn.disabled = false;
  }
}

/* ─── RENDER: Access Denied ─────────────────────────────────────────── */
function renderDenied(container) {
  container.innerHTML = `
    <div class="state-denied">
      <span class="denied-icon">⛔</span>
      <h3>Access Denied: Unauthorized ID</h3>
      <p>This Employee ID is not registered in the system.</p>
    </div>
  `;
}

/* ─── RENDER: Employee Action Buttons (State-Adaptive) ───────────────── */
function renderEmployeeActions(container, id, name, state) {
  const badgeClass = { OUT: 'badge-out', IN: 'badge-in', ON_BREAK: 'badge-break' }[state];
  const stateLabel = { OUT: 'Clocked Out', IN: 'On Shift', ON_BREAK: 'On Break' }[state];

  let buttons = '';

  // ── STATE CONTROLLER SWITCHBOARD ─────────────────────────────────
  // Each state exposes ONLY the contextually valid actions.
  if (state === 'OUT') {
    buttons = `
      <button class="btn-action btn-start" onclick="recordAction('${id}','${esc(name)}','START_SHIFT','IN')">
        ▶ Start Shift
      </button>`;
  } else if (state === 'IN') {
    buttons = `
      <button class="btn-action btn-break" onclick="recordAction('${id}','${esc(name)}','START_BREAK','ON_BREAK')">
        ⏸ Take Break
      </button>
      <button class="btn-action btn-end" onclick="recordAction('${id}','${esc(name)}','END_SHIFT','OUT')">
        ◼ End Shift
      </button>`;
  } else if (state === 'ON_BREAK') {
    buttons = `
      <button class="btn-action btn-return" onclick="recordAction('${id}','${esc(name)}','RETURN_FROM_BREAK','IN')">
        ↩ Return From Break
      </button>
      <button class="btn-action btn-end" onclick="recordAction('${id}','${esc(name)}','END_SHIFT','OUT')">
        ◼ End Shift (Force Logout)
      </button>`;
  }

  container.innerHTML = `
    <div class="employee-panel">
      <div class="employee-name">${escHtml(name)}</div>
      <div class="employee-badge ${badgeClass}">
        <span class="badge-dot"></span>${stateLabel}
      </div>
      <div class="action-buttons">${buttons}</div>
    </div>
  `;
}

/* ─── ACTION HANDLER: POST log + PATCH state → reset terminal ───────── */
async function recordAction(employeeId, employeeName, actionType, newState) {
  // Disable all action buttons immediately to prevent double-taps
  document.querySelectorAll('.btn-action').forEach(b => b.disabled = true);

  try {
    // 1. Insert activity log row (timestamp is server-side via DB default: now())
    await sbPost('time_logs', { employee_id: employeeId, action_type: actionType });

    // 2. Update the employee's state in profiles
    await sbPatch('profiles', `employee_id=eq.${encodeURIComponent(employeeId)}`, {
      current_state: newState
    });

    // 3. Build a human-readable action label for the toast
    const labels = {
      START_SHIFT:         'Start Shift',
      START_BREAK:         'Break Started',
      RETURN_FROM_BREAK:   'Returned From Break',
      END_SHIFT:           'Shift Ended'
    };
    const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    showToast(`✓ Punch Recorded: ${labels[actionType]} at ${timeStr}`, 'success');

    // 4. ── HARDWARE TERMINAL CLEANUP ──────────────────────────────
    // Immediately wipe the UI to neutral — next person sees a blank slate.
    resetKiosk();

  } catch (err) {
    document.querySelectorAll('.btn-action').forEach(b => b.disabled = false);
    showToast('Error recording punch. Please try again.', 'error');
    console.error('Action error:', err);
  }
}

/* ─── Reset kiosk to clean neutral state ────────────────────────────── */
function resetKiosk() {
  document.getElementById('id-input').value = '';
  document.getElementById('kiosk-status').innerHTML = '';
  document.getElementById('id-input').focus();
}

/* ═══════════════════════════════════════════════════════════════════════
   ADMIN — ADD EMPLOYEE
   ═══════════════════════════════════════════════════════════════════════ */
async function addEmployee() {
  const name = document.getElementById('admin-name').value.trim();
  const id   = document.getElementById('admin-id').value.trim();
  const btn  = document.getElementById('btn-add-employee');

  if (!name || !id) {
    showToast('Please enter both a name and an Employee ID.', 'error');
    return;
  }
  if (!/^\d{4,8}$/.test(id)) {
    showToast('Employee ID must be 4–8 digits.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Adding…';

  try {
    await sbPost('profiles', {
      employee_id:   id,
      full_name:     name,
      current_state: 'OUT'         // new employees always start clocked out
    });

    showToast(`✓ ${name} added with ID ${id}`, 'success');
    document.getElementById('admin-name').value = '';
    document.getElementById('admin-id').value   = '';
    loadRoster();  // refresh the live roster

  } catch (err) {
    const msg = err.message || '';
    if (msg.includes('duplicate') || msg.includes('unique')) {
      showToast(`ID ${id} is already taken. Choose another.`, 'error');
    } else {
      showToast('Error adding employee. Check the console.', 'error');
    }
    console.error('Add employee error:', err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to Roster';
  }
}

/* ─── Random 6-digit PIN generator ─────────────────────────────────── */
function generatePIN() {
  // Generates a cryptographically random 6-digit numeric ID
  const pin = String(Math.floor(100000 + Math.random() * 900000));
  document.getElementById('admin-id').value = pin;
}

/* ═══════════════════════════════════════════════════════════════════════
   ADMIN — LOAD LIVE ROSTER
   Admin section IS allowed to read the full profiles table.
   ═══════════════════════════════════════════════════════════════════════ */
async function loadRoster() {
  const container = document.getElementById('roster-container');
  container.innerHTML = '<div class="roster-empty">Loading…</div>';

  try {
    const rows = await sbGet('profiles', 'select=employee_id,full_name,current_state&order=full_name.asc');

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="roster-empty">No employees yet. Add one using the form.</div>';
      return;
    }

    const stateMap = {
      OUT:      { label: 'Out',       cls: 'pill-out'   },
      IN:       { label: 'On Shift',  cls: 'pill-in'    },
      ON_BREAK: { label: 'On Break',  cls: 'pill-break' }
    };

    const rows_html = rows.map(emp => {
      const s = stateMap[emp.current_state] || stateMap['OUT'];
      return `
        <tr>
          <td>${escHtml(emp.full_name)}</td>
          <td><span class="id-mono">${escHtml(emp.employee_id)}</span></td>
          <td>
            <span class="state-pill ${s.cls}">
              <span class="pill-dot"></span>${s.label}
            </span>
          </td>
          <td>
            <button class="btn-del" title="Remove employee"
              onclick="deleteEmployee('${esc(emp.employee_id)}','${esc(emp.full_name)}')">
              ✕
            </button>
          </td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="roster-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows_html}</tbody>
      </table>
    `;
  } catch (err) {
    container.innerHTML = '<div class="roster-empty">Error loading roster. Check console.</div>';
    console.error('Roster load error:', err);
  }
}

/* ─── ADMIN: Delete Employee ────────────────────────────────────────── */
async function deleteEmployee(id, name) {
  if (!confirm(`Remove ${name} (ID: ${id}) from the system?\n\nThis also deletes their time log history.`)) return;
  try {
    await sbDelete('profiles', `employee_id=eq.${encodeURIComponent(id)}`);
    showToast(`${name} removed from roster.`, 'success');
    loadRoster();
  } catch (err) {
    showToast('Error deleting employee.', 'error');
    console.error('Delete error:', err);
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(message, type = 'success') {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = message;
  t.className   = `show ${type}`;
  toastTimer = setTimeout(() => { t.className = ''; }, 3200);
}

/* ═══════════════════════════════════════════════════════════════════════
   SECURITY UTILITIES
   ═══════════════════════════════════════════════════════════════════════ */
// Escape for HTML contexts
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
// Escape for inline event handler attribute values
function esc(str) {
  return String(str).replace(/'/g,"\\'").replace(/"/g,'\\"');
}

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('id-input').focus();

  // Allow pressing Enter anywhere on ID input to trigger lookup
  document.getElementById('id-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookupEmployee();
  });
});
</script>
